<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UtilityVerse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="left-side">
            <img src="asset/logo.jpeg" alt="UtilityVerse Logo">
            <h1>UtilityVerse</h1>
        </div>
        <div class="right-side">
            <nav>
             <button class="theme">
                <img src="asset/Theme">
                <span class="tooltip">Theme</span>
             </button>
             <button class="profile">
                <img src="asset/profile">
                <span class="tooltip">Profile</span>
             </button>
             <button class="menu">
                <img src="asset/menu.png" alt="Menu">
                <span class="tooltip">Menu</span>
            </button>
            </nav>
        </div>
    </header>
    <div class="container">
        <aside>
            <ul>
                 <li>
                    <a href="#" class="dash-icon">
                        <img src="asset/Dashboard" alt="Dashboard">
                        Dashboard
                    </a>
                 </li>
                 <li>
                    <a href="#" class="dash-icon">
                        <img src="asset/calculator" alt="Calculator">
                        Calculator
                    </a>
                 </li>
                 <li>
                    <a href="#" class="dash-icon">
                        <img src="asset/student" alt="Studnet Tools">
                        Student Tools
                    </a>
                 </li>
                 <li>
                    <a href="#" class="dash-icon">
                        <img src="asset/Finance" alt="Finance">
                         Finance Tools
                    </a>
                 </li>
                 <li>
                    <a href="#" class="dash-icon">
                        <img src="asset/converter" alt="Converter">
                        Converter
                    </a>
                 </li>
                 <li>
                    <a href="#" class="dash-icon">
                        <img src="asset/utilities" alt="Utilities">
                        Utilities
                    </a>
                 </li>
                 <li>
                    <a href="#" class="dash-icon">
                        <img src="asset/setting" alt="setting">
                        Settings
                    </a>
                 </li>
            </ul>
        </aside>
        <main>
            <h1>Welcome Back 👋</h1>
            <p>Your all-in-one utility dashboard</p>

        <div class="card-section">
            <div class="card">
                <h2><img src="asset/calculator">Calculator</h2>
                <p>Perform calculations</p>
            </div>
        <div class="card">
            <h2><img src="asset/student">Student Tools</h2>
            <p>CGPA & Percentage</p>
        </div>
        <div class="card">
            <h2><img src="asset/Finance">Finance</h2>
            <p>EMI & GST</p>
        </div>
        <div class="card">
            <h2><img src="asset/converter">Converter</h2>
            <p>Unit Conversion</p>
        </div>
        </div>
        </main>
    </div>
    <footer></footer>
    <script src="script.js"></script>
</body>
</html>
