 <main>
    <h1>🎓 CGPA Calculator</h1>

    <section class="cgpa-calculator">

        <div class="input-group">
            <label for="semesterCount">Completed Semesters</label>
            <input type="number" id="semesterCount" placeholder="Enter completed semesters (1-8)" min="1" max="8">
        </div>

        <button id="generateBtn">Generate Inputs</button>

        <div id="semesterInputs">

        </div>

        <button id="calculateBtn">Calculate CGPA</button>

        </div>
